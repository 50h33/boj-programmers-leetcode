name: Move LeetCode Solutions

on:
  workflow_dispatch:
  push:
    paths:
      - '[0-9][0-9][0-9][0-9]-*/**'

jobs:
  move-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Move LeetCode solutions
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          echo "Current directory contents:"
          ls -la

          mkdir -p "리트코드"

          echo "Changed files in this push:"
          git diff --name-only HEAD^ HEAD || true

          found=0

          changed_dirs=$(git diff --name-only HEAD^ HEAD \
            | grep -E '^[0-9]{4}-' \
            | cut -d/ -f1 \
            | sort -u || true)

          for d in $changed_dirs; do
            if [ -d "$d" ]; then
              echo "Moving directory: $d"
              mv "$d" "리트코드/"
              found=1
            fi
          done

          if [ "$found" -eq 0 ]; then
            echo "No matching directories found to move"
          fi

      - name: Commit & Push changes
        shell: bash
        run: |
          set -euo pipefail

          if git status --porcelain | grep .; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: move LeetCode solutions to 리트코드 folder"
            git push
          else
            echo "No changes to commit"
          fi